{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.AppName}}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__logo">⚔</span>
      <span class="app-header__name">{{.AppName}}</span>
      <span class="app-header__subtitle">Maître de Jeu IA</span>
    </div>
    <!-- Badge de connexion IA + sélecteur de modèle -->
    <div class="connection-badge" id="connection-badge">
      <span class="connection-badge__dot {{.Status.Color}}" id="status-dot"></span>
      <!-- Quand un seul modèle : label simple. Quand plusieurs : select apparaît via JS -->
      <span class="connection-badge__label" id="status-label">{{.Status.Label}}</span>
      <select class="connection-badge__select" id="model-select" aria-label="Sélectionner le modèle IA" hidden></select>
      <button class="connection-badge__refresh" id="refresh-btn" title="Rafraîchir la détection des providers">↻</button>
    </div>
  </header>

  <main class="app-main">
    {{block "content" .}}{{end}}
  </main>

  <!-- markdown.js doit être chargé avant chat.js car il expose renderMarkdown() -->
  <script src="/static/js/markdown.js" defer></script>
  <script src="/static/js/chat.js" defer></script>
</body>
</html>
{{end}}
