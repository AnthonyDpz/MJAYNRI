{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.AppName}}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__logo">⚔</span>
      <span class="app-header__name">{{.AppName}}</span>
      <span class="app-header__subtitle">Maître de Jeu IA</span>
    </div>
    <!-- Badge de connexion IA — mis à jour dynamiquement par /api/status -->
    <div class="connection-badge" id="connection-badge" data-status="{{.Status.Raw}}">
      <span class="connection-badge__dot {{.Status.Color}}" id="status-dot"></span>
      <span class="connection-badge__label" id="status-label">{{.Status.Label}}</span>
      <button class="connection-badge__refresh" id="refresh-btn" title="Rafraîchir la connexion">↻</button>
    </div>
  </header>

  <main class="app-main">
    {{block "content" .}}{{end}}
  </main>

  <script src="/static/js/chat.js" defer></script>
</body>
</html>
{{end}}
